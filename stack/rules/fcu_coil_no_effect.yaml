# FCU: fan on and a valve open, but no meaningful air temperature change across the coil.
# Detects stuck valve, dead coil, airside bypass, or failed SAT/RAT sensor.
# Uses rolling min of |SAT - RAT| so transient zero-crossings don't trigger.
name: fcu_coil_no_effect
description: FCU fan and valve on but no air-side temperature effect across coil
type: expression
flag: fcu_coil_no_effect_flag
equipment_type: [Fan_Coil_Unit]

inputs:
  Supply_Air_Temperature_Sensor:
    brick: Supply_Air_Temperature_Sensor
  Return_Air_Temperature_Sensor:
    brick: Return_Air_Temperature_Sensor
  Heating_Valve_Command:
    brick: Heating_Valve_Command
  Cooling_Valve_Command:
    brick: Cooling_Valve_Command
  Supply_Fan_Command:
    brick: Supply_Fan_Command

params:
  min_delta_t: 1.5          # °F — minimum air-side lift expected when valve is open
  vlv_open: 0.25
  rolling_window: 6

expression: |
  (np.abs(Supply_Air_Temperature_Sensor - Return_Air_Temperature_Sensor) < min_delta_t) & ((normalize_cmd(Heating_Valve_Command) > vlv_open) | (normalize_cmd(Cooling_Valve_Command) > vlv_open)) & (normalize_cmd(Supply_Fan_Command) > 0)
