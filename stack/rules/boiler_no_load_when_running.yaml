# Boiler running but HW supply/return delta-T near zero → flow without load, bypass open,
# primary/secondary hydraulic issue, or miswired sensors. Typical HW delta-T is 10–20°F.
name: boiler_no_load_when_running
description: Boiler status ON but HW supply/return delta-T below minimum expected
type: expression
flag: boiler_no_load_flag
equipment_type: [Boiler]

inputs:
  Hot_Water_Supply_Temperature_Sensor:
    brick: Hot_Water_Supply_Temperature_Sensor
  Hot_Water_Return_Temperature_Sensor:
    brick: Hot_Water_Return_Temperature_Sensor
  Boiler_Status:
    brick: Boiler_Status

params:
  min_hw_dt: 3.0            # °F — below this, boiler is doing little useful work
  rolling_window: 12        # ~1 h at 5-min sampling

expression: |
  ((Hot_Water_Supply_Temperature_Sensor - Hot_Water_Return_Temperature_Sensor) < min_hw_dt) & (normalize_cmd(Boiler_Status) > 0)
