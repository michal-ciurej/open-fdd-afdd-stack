title: "Open-FDD AFDD stack"
description: "Docker AFDD platform — BACnet, TimescaleDB, Grafana, FastAPI (engine: open-fdd on PyPI)"
baseurl: "/open-fdd-afdd-stack"
remote_theme: just-the-docs/just-the-docs
color_scheme: "light"

# Match engine docs branding (shared project visual)
logo: "https://raw.githubusercontent.com/bbartling/open-fdd/master/image.png"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag

aux_links:
  "AFDD stack (GitHub)": "https://github.com/bbartling/open-fdd-afdd-stack"
  "Engine docs": "https://bbartling.github.io/open-fdd/"
  "Engine (GitHub)": "https://github.com/bbartling/open-fdd"
  "PyPI (open-fdd)": "https://pypi.org/project/open-fdd/"

footer_content: "MIT · <a href=\"https://github.com/bbartling/open-fdd-afdd-stack\">AFDD stack</a> · <a href=\"https://bbartling.github.io/open-fdd/\">Engine docs</a>"

heading_anchors: true

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true
