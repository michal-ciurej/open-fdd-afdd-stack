name: Build docs PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'docs/**'
      - 'scripts/build_docs_pdf.py'
      - '.github/workflows/build-docs-pdf.yml'

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml weasyprint

      - name: Install pandoc
        uses: pandoc/actions/setup@v1
        with:
          version: '3.1.13'

      - name: Build docs PDF
        run: |
          python scripts/build_docs_pdf.py --pdf-engine weasyprint

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: open-fdd-automated-testing-docs
          path: |
            pdf/open-fdd-automated-testing-docs.pdf
            pdf/open-fdd-automated-testing-docs.txt
            docs/_build/combined.md

      - name: Commit generated PDF and text
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pdf/open-fdd-automated-testing-docs.pdf pdf/open-fdd-automated-testing-docs.txt || true
          if git diff --cached --quiet; then
            echo "No generated doc changes to commit"
          else
            git commit -m "docs: build automated testing PDF"
            git push
          fi
